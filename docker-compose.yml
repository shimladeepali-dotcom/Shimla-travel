version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shimla_travel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shimla_travel
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: shimla_travel_adminer
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: shimla_travel_network
